name: Antigravity-Loop

on:
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

    # 修正版：确保安装了 openai 库以兼容阿里云
      - name: Install Libs
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy google-genai openai

    # 修正版：严谨的缩进，确保 Key 被识别为环境变量
      - name: Execute V6.8 Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}
        run: python genesis_crawler.py

      - name: Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "The Architect"
          git add Latest_Prediction.md
          git commit -m "🌌 V6.8: 三线算力突围" || echo "No changes"
          git push
