name: Antigravity Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '15 14 * * 2,4,7'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install pandas xgboost numpy

      - name: Run evolution
        run: python genesis_evolution.py

      - name: Save results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # 核心修正：增加容错判断，防止空提交报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "🌌 Antigravity 3.1: 闭环回馈" && git push)
