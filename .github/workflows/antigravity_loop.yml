name: Antigravity-Loop

on:
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install AI & Physics Libs
        run: |
          pip install pandas numpy xgboost scikit-learn scipy google-generativeai

      - name: Execute V4.1 Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python genesis_evolution.py

      - name: Commit & Push Report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Latest_Prediction.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "🌌 准头强化版推演完成" && git push)
