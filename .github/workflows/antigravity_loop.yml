name: Antigravity-Loop

on:
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Libs
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy google-genai

    - name: Execute V6.3 Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python genesis_crawler.py

    - name: Commit & Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "The Architect"
        git add Latest_Prediction.md
        git commit -m "🌌 V6.3: 2.0 Flash 协议觉醒" || echo "No changes"
        git push
